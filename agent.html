<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiffyverse | Sovereign Agent</title>
  <style>
    :root { --gold: #bf953f; --black: #050505; --electric-blue: #00f0ff; }
    body { background: var(--black); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; min-height: 100vh; }
    .container { width: 100%; max-width: 900px; padding: 40px; margin: 0 auto; background: #0a0a0a; border: 1px solid #333; box-sizing: border-box; }
    h2 { color: var(--gold); text-align: center; letter-spacing: 2px; }
    input { width: 100%; padding: 20px; margin: 15px 0; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 20px; background: var(--electric-blue); border: none; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    .lead-item { border: 1px solid #333; padding: 15px; margin-top: 10px; }
    #agentInfo { text-align: center; padding: 10px; color: var(--electric-blue); }
  </style>
</head>
<body>

<div class="container">
    <h2>Sovereign Agent Portal</h2>
    <div id="agentInfo">Status: Not Registered</div>
    <button id="register-btn" onclick="registerAsAgent()">ACTIVATE SALES AGENT STATUS</button>

    <div id="lead-capture" style="display:none;">
        <h3>Capture New Lead</h3>
        <input type="text" id="businessName" placeholder="Business Name">
        <input type="text" id="phoneInput" placeholder="WhatsApp Number">
        <button onclick="captureNewLead()">INITIATE PITCH</button>
    </div>

    <h3>Active Pipeline</h3>
    <div id="leads-list"></div>
</div>

<script>
    function registerAsAgent() {
        if (!localStorage.getItem("KYC_Verified_Hash")) {
            alert("Identity verification not found. Please complete the registration in your KYC app.");
            return;
        }

        const agentUUID = `TIF_AGENT_${Date.now()}`;
        const newLedger = { 
            profile: { agentID: agentUUID, registeredAt: new Date().toISOString() }, 
            leads: [] 
        };
        localStorage.setItem('tiffy_agent_ledger', JSON.stringify(newLedger));
        location.reload(); 
    }

    function captureNewLead() {
        const name = document.getElementById('businessName').value;
        const phone = document.getElementById('phoneInput').value;
        if (!name) return;

        try {
            const ledger = JSON.parse(localStorage.getItem('tiffy_agent_ledger'));
            ledger.leads.push({ business: name, phone: phone, status: "PENDING_PAY" });
            localStorage.setItem('tiffy_agent_ledger', JSON.stringify(ledger));
            renderLeads();
        } catch(e) { console.error("Ledger error:", e); }
    }

    function renderLeads() {
        const raw = localStorage.getItem('tiffy_agent_ledger');
        if (!raw) return;
        const ledger = JSON.parse(raw);
        const list = document.getElementById('leads-list');
        list.innerHTML = '';
        ledger.leads.forEach(lead => {
            list.innerHTML += `<div class="lead-item">
                <strong>${lead.business}</strong><br>
                Status: ${lead.status}<br>
                <a href="https://wa.me/${lead.phone}" style="color: #25D366; text-decoration: none;">💬 WhatsApp Pitch</a>
            </div>`;
        });
    }

    window.onload = () => {
        const ledger = localStorage.getItem('tiffy_agent_ledger');
        if (ledger) {
            // THE MISSING FUNCTIONAL LINES:
            document.getElementById('register-btn').style.display = 'none';
            document.getElementById('lead-capture').style.display = 'block';
            const data = JSON.parse(ledger);
            document.getElementById('agentInfo').innerText = `Agent ID: ${data.profile.agentID}`;
            renderLeads();
        }
    };
</script>
</body>
</html>

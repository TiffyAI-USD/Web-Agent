<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tiffyverse | Agent Portal</title>
  <style>
    /* Full screen mobile-first design */
    body { 
      background: #000; color: #00f0ff; font-family: sans-serif; 
      margin: 0; padding: 15px; min-height: 100vh; box-sizing: border-box;
    }
    .glass-card { 
      background: rgba(255, 255, 255, 0.05); border: 1px solid #00f0ff; 
      padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; 
      margin: 0 auto 20px auto; box-sizing: border-box;
    }
    input { 
      background: #111; color: #00f0ff; border: 1px solid #00f0ff; 
      padding: 15px; width: 100%; margin-bottom: 15px; border-radius: 8px;
      box-sizing: border-box; font-size: 16px;
    }
    button { 
      background: #00f0ff; color: #000; padding: 20px; border: none; 
      border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;
    }
    .lead-item { border-bottom: 1px solid #333; padding: 15px 0; }
  </style>
</head>
<body>

  <div class="glass-card" id="agent-container">
    <h2>Sovereign Agent Portal</h2>
    <div id="agentInfo">Status: Not Registered</div>
    <button id="register-btn" onclick="registerAsAgent()">ACTIVATE SALES AGENT STATUS</button>
  </div>

  <div class="glass-card" id="lead-capture" style="display:none;">
    <h3>Capture New Lead</h3>
    <input type="text" id="businessName" placeholder="Business Name">
    <input type="tel" id="phoneInput" placeholder="WhatsApp Number (e.g. 2782...)">
    <button onclick="captureNewLead()">INITIATE PITCH</button>
  </div>

  <div class="glass-card">
    <h3>Active Pipeline</h3>
    <div id="leads-list"></div>
  </div>

  <script>
    // --- 1. Registration Logic (Fixed KYC Check) ---
    function registerAsAgent() {
        const kycData = JSON.parse(localStorage.getItem('user_kyc_data'));

        // Check if data exists AND if the status is explicitly verified
        // Replace 'status' and 'VERIFIED' with your exact KYC field names
        if (!kycData || kycData.status !== 'VERIFIED') {
            alert("KYC verification required to become an Agent.");
            return;
        }

        const agentUUID = `TIF_AGENT_${Date.now()}_${kycData.id_hash.substring(0, 5)}`;
        const agentProfile = { agentID: agentUUID, owner: kycData.name, registeredAt: new Date().toISOString() };

        localStorage.setItem('tiffy_agent_ledger', JSON.stringify({ profile: agentProfile, leads: [] }));
        location.reload(); 
    }
    
    // ... (keep captureNewLead and renderLeads logic the same as before)
  </script>
</body>
</html>

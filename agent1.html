<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tiffyverse | Sovereign Agent</title>
  <style>
    :root { --gold: #bf953f; --black: #050505; --electric-blue: #00f0ff; --red: #ff0033; --green: #00ff41; }
    body { background: var(--black); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; min-height: 100vh; }
    .container { width: 100%; max-width: 900px; margin: 0 auto; }
    .glass-card { background: #0a0a0a; border: 1px solid #333; padding: 20px; margin-bottom: 20px; }
    h2 { color: var(--gold); text-align: center; letter-spacing: 4px; text-transform: uppercase; }
    input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 20px; background: linear-gradient(135deg, #bf953f, #b38728); border: none; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    .lead-item { border: 1px solid #444; padding: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .stat-box { text-align: center; }
    .glow-green { box-shadow: 0 0 15px var(--green); border-color: var(--green); }
    .kyc-btn { background: var(--electric-blue); color: #000; margin-top: 10px; }
    .pitch-btn { padding: 10px 15px; background: var(--electric-blue); color: #000; text-decoration: none; font-weight: bold; font-size: 14px; }
    .del-btn { padding: 10px 15px; background: var(--red); border: none; color: white; font-weight: bold; cursor: pointer; margin-left: 10px; }
  </style>
</head>
<body>

<div class="container">
    <h2>Sovereign Agent Portal</h2>
    <div id="agentInfo" style="text-align:center; color: var(--electric-blue); margin-bottom: 20px;">Not Registered</div>
    
    <div class="glass-card" style="display: flex; justify-content: space-around;">
        <div class="stat-box"><small>SALES</small><div id="day-sales" style="font-size: 1.5rem; color: var(--gold);">0</div></div>
        <div class="stat-box"><small>INCOME</small><div id="day-income" style="font-size: 1.5rem; color: var(--green);">$0.00</div></div>
    </div>

    <div id="registration-area">
        <button id="register-btn" onclick="registerAsAgent()">ACTIVATE SALES AGENT STATUS</button>
    </div>

    <div id="lead-capture" class="glass-card" style="display:none;">
        <h3>Capture New Lead</h3>
        <input type="text" id="businessName" placeholder="Business Name">
        <input type="text" id="phoneInput" placeholder="WhatsApp Number (e.g. 2782...)">
        <button onclick="captureNewLead()" style="background: var(--electric-blue);">INITIATE PITCH</button>
    </div>

    <h3>Active Pipeline</h3>
    <div id="leads-list"></div>
</div>

<script>
    const kycLink = "./kyc-portal.html"; // Replace with your actual KYC file path
    const pitchText = `The "Tiffyverse" Activation Pitch\n\nYour activation secures your Sovereign Business Suite for just $10/month.\n\nYour activation instantly secures:\n1. Sovereign Bank: $10 Opening Capital credited back to you immediately.\n2. AI Store Builder: A fully automated retail engine.\n3. Marketplace Control Panel: Total administrative authority.`;

    function registerAsAgent() {
        if (!localStorage.getItem("KYC_Verified_Hash")) {
            const regArea = document.getElementById('registration-area');
            regArea.innerHTML = `<p style="color:var(--red); text-align:center;">KYC Verification Required</p>
                                 <button class="kyc-btn" onclick="window.location.href='${kycLink}'">COMPLETE KYC VERIFICATION</button>`;
            return;
        }
        const agentUUID = `TIF_AGENT_${Date.now()}`;
        localStorage.setItem('tiffy_agent_ledger', JSON.stringify({ profile: { agentID: agentUUID }, leads: [] }));
        location.reload(); 
    }

    function captureNewLead() {
        const name = document.getElementById('businessName').value;
        const phone = document.getElementById('phoneInput').value;
        if (!name || !phone) { alert("Please enter business name and phone."); return; }
        
        const ledger = JSON.parse(localStorage.getItem('tiffy_agent_ledger'));
        ledger.leads.push({ business: name, phone: phone, status: "PENDING_PAY", timestamp: new Date().toISOString() });
        localStorage.setItem('tiffy_agent_ledger', JSON.stringify(ledger));
        
        document.getElementById('businessName').value = '';
        document.getElementById('phoneInput').value = '';
        renderLeads();
    }

    function renderLeads() {
        const raw = localStorage.getItem('tiffy_agent_ledger');
        if (!raw) return;
        const ledger = JSON.parse(raw);
        const list = document.getElementById('leads-list');
        list.innerHTML = '';
        
        ledger.leads.forEach((lead, index) => {
            const isPaid = lead.status === 'PAID';
            const waUrl = `https://wa.me/${lead.phone}?text=${encodeURIComponent("Hi " + lead.business + ", " + pitchText)}`;
            
            list.innerHTML += `
                <div class="lead-item ${isPaid ? 'glow-green' : ''}">
                    <div>
                        <strong>${lead.business}</strong><br>
                        <small>Status: ${lead.status}</small>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <a href="${waUrl}" target="_blank" class="pitch-btn">💬 PITCH</a>
                        <button class="del-btn" onclick="removeLead(${index})">X</button>
                    </div>
                </div>`;
        });
        updateStats(ledger);
    }

    function updateStats(ledger) {
        const today = new Date().toLocaleDateString();
        const salesToday = ledger.leads.filter(l => l.status === 'PAID' && new Date(l.timestamp).toLocaleDateString() === today);
        document.getElementById('day-sales').innerText = salesToday.length;
        document.getElementById('day-income').innerText = `$${(salesToday.length * 5).toFixed(2)}`;
    }

    function removeLead(index) {
        const ledger = JSON.parse(localStorage.getItem('tiffy_agent_ledger'));
        ledger.leads.splice(index, 1);
        localStorage.setItem('tiffy_agent_ledger', JSON.stringify(ledger));
        renderLeads();
    }

    window.onload = () => {
        const ledger = localStorage.getItem('tiffy_agent_ledger');
        if (ledger) {
            document.getElementById('registration-area').style.display = 'none';
            document.getElementById('lead-capture').style.display = 'block';
            const data = JSON.parse(ledger);
            document.getElementById('agentInfo').innerText = `AGENT ID: ${data.profile.agentID}`;
            renderLeads();
        }
    };
</script>
</body>
</html>
